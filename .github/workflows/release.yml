name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
  CARGO_PROFILE_RELEASE_LTO: "false"
  CARGO_PROFILE_RELEASE_OPT_LEVEL: "2"

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      cargo_version: ${{ steps.version.outputs.cargo_version }}
      display_version: ${{ steps.version.outputs.display_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          upstream_tag="$(gh release view --repo openai/codex --json tagName --jq '.tagName')"
          build_number="$(date -u +%s)"
          python3 .github/scripts/kodex_release_version.py "$upstream_tag" "$build_number" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    env:
      TARGET: ${{ matrix.target }}
      KODEX_CLI_VERSION: ${{ needs.metadata.outputs.version }}
    defaults:
      run:
        shell: bash
        working-directory: codex-rs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust target for active toolchain
        run: rustup target add "$TARGET"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: |
            codex-rs -> target
          cache-workspace-crates: true

      - name: Setup rusty_v8 artifacts
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          python3 -m pip install --user cargo-zigbuild==0.22.3 ziglang==0.16.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare musl build tools
        if: runner.os == 'Linux'
        run: bash ../.github/scripts/install-musl-build-tools.sh

      - name: Build release binary
        run: |
          set -euo pipefail
          if [[ "$TARGET" == *-unknown-linux-musl ]]; then
            cargo_linker_var="CARGO_TARGET_${TARGET^^}_LINKER"
            cargo_linker_var="${cargo_linker_var//-/_}"
            unset "$cargo_linker_var"
            CARGO_ZIGBUILD_ZIG_PATH=python-zig cargo zigbuild --release --timings -p codex-cli --bin kodex --target "$TARGET"
          else
            cargo build --release --timings -p codex-cli --bin kodex --target "$TARGET"
          fi

      - name: Upload cargo timings
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cargo-timings-${{ matrix.target }}
          path: codex-rs/target/cargo-timings
          if-no-files-found: ignore

      - name: Package release archive
        id: package
        run: |
          set -euo pipefail
          release_dir="target/${TARGET}/release"
          stage_dir="${RUNNER_TEMP}/kodex-release-${TARGET}"
          archive="${RUNNER_TEMP}/kodex-${TARGET}.tar.gz"

          rm -rf "$stage_dir"
          mkdir -p "$stage_dir"
          cp "$release_dir/kodex" "$stage_dir/kodex"
          chmod 0755 "$stage_dir/kodex"
          tar -C "$stage_dir" -czf "$archive" kodex

          printf 'archive=%s\n' "$archive" >> "$GITHUB_OUTPUT"

      - name: Upload release archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: kodex-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}

  publish:
    needs:
      - metadata
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download release archives
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find release-assets -type f -name '*.tar.gz' -exec cp {} dist/ \;
          ls -l dist

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist -maxdepth 1 -type f | sort)
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Kodex $RELEASE_VERSION" \
            --notes "Automated release for $GITHUB_SHA" \
            "${assets[@]}"
